name: CD Event Thunder

on:
  workflow_run:
    workflows: ["CI Event Thunder"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deployer via Tailscale
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Connecter le runner au tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verifier l'acces au serveur
        run: tailscale ping --timeout=10s ${{ secrets.TS_TAILNET_HOST }}

      - name: Deploiement via Tailscale SSH
        run: |
          tailscale ssh ${{ secrets.TS_SSH_USER }}@${{ secrets.TS_TAILNET_HOST }} -- bash -lc '
            cd /var/www/html/Event_Thunder
            git pull origin main
            sudo docker compose down
            # utiliser le script de demarrage propre pour eviter les problemes de migration Prisma
            # sudo docker compose up -d --build
            # sudo docker compose ps
          '

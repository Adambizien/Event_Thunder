name: CI Event Thunder

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Test du service API Gateway
  test-api-gateway:
    name: Test API Gateway
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: api-gateway/package-lock.json
      
      - name: Install dependencies
        working-directory: ./api-gateway
        run: npm ci
      
      - name: Lint code
        working-directory: ./api-gateway
        run: npm run lint
      
      - name: Build
        working-directory: ./api-gateway
        run: npm run build
      
      - name: Run tests
        working-directory: ./api-gateway
        run: npm run test

      - name: Run end-to-end tests
        working-directory: ./api-gateway
        run: npm run test:e2e

